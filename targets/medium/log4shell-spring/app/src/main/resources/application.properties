# =============================================================================
# Howl Inventory API - Spring Boot Configuration
# =============================================================================

# Server configuration
server.port=8080
server.address=0.0.0.0

# Application info (exposed for reconnaissance)
spring.application.name=howl-inventory-api
info.app.name=Howl Inventory API
info.app.version=1.0.0
info.app.description=Internal inventory management system

# Actuator endpoints (exposed for reconnaissance)
management.endpoints.web.exposure.include=info,health,env
management.endpoint.health.show-details=always
management.endpoint.env.show-values=ALWAYS

# Custom server header (leaks stack info)
server.servlet.context-path=/
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always

# Logging configuration - use Log4j2
logging.level.root=INFO
logging.level.com.howl.inventory=DEBUG
