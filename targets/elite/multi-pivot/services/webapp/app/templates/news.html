<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company News - CorpNet Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0e17;
            color: #c9d1d9;
            min-height: 100vh;
        }

        .navbar {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar .logo {
            font-size: 1.4em;
            font-weight: bold;
            color: #58a6ff;
        }

        .navbar .logo span {
            color: #f0883e;
        }

        .navbar nav a {
            color: #8b949e;
            text-decoration: none;
            margin-left: 24px;
            font-size: 0.95em;
            transition: color 0.2s;
        }

        .navbar nav a:hover,
        .navbar nav a.active {
            color: #58a6ff;
        }

        .container {
            max-width: 800px;
            margin: 48px auto;
            padding: 0 32px;
        }

        h1 {
            color: #e6edf3;
            font-size: 1.8em;
            margin-bottom: 32px;
        }

        .article {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        .article:hover {
            border-color: #30363d;
        }

        .article h3 {
            color: #e6edf3;
            font-size: 1.1em;
            margin-bottom: 6px;
        }

        .article .date {
            color: #58a6ff;
            font-size: 0.8em;
            margin-bottom: 12px;
        }

        .article p {
            color: #8b949e;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            padding: 32px;
            color: #484f58;
            font-size: 0.85em;
            border-top: 1px solid #21262d;
            margin-top: 64px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Corp<span>Net</span> Solutions</div>
        <nav>
            <a href="/">Home</a>
            <a href="/news" class="active">News</a>
            <a href="/fetch">Website Status</a>
        </nav>
    </div>

    <div class="container">
        <h1>Company News</h1>

        {% for article in articles %}
        <div class="article">
            <h3>{{ article.title }}</h3>
            <div class="date">{{ article.date }}</div>
            <p>{{ article.summary }}</p>
        </div>
        {% endfor %}
    </div>

    <div class="footer">
        CorpNet Solutions v3.2.1 &mdash; Public Portal &mdash; &copy; 2024 CorpNet Solutions Inc.
    </div>
</body>
</html>
